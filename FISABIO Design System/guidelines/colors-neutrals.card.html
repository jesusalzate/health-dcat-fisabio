<!-- @dsCard group="Colors" viewport="700x164" name="Neutrals" subtitle="Cool, faintly indigo-tinted greys from paper to ink" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;color:#fff;border:1px solid rgba(0,0,0,.05)}
  .sw small{font-family:var(--font-mono);font-size:10px;line-height:1.5;opacity:.9}
  .sw b{font-family:var(--font-display);font-size:12px;font-weight:600}
  .dark small,.dark b{color:var(--fs-ink);opacity:1}
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--fs-white)"><b>white</b><small>#ffffff</small></div>
    <div class="sw dark" style="background:var(--fs-paper)"><b>paper</b><small>#f6f6fb</small></div>
    <div class="sw dark" style="background:var(--fs-grey-100)"><b>100</b><small>#e7e7ee</small></div>
    <div class="sw dark" style="background:var(--fs-grey-200)"><b>200</b><small>#d6d6e0</small></div>
    <div class="sw dark" style="background:var(--fs-grey-300)"><b>300</b><small>#b6b6c6</small></div>
    <div class="sw" style="background:var(--fs-grey-400)"><b>400</b><small>#8c8ca0</small></div>
    <div class="sw" style="background:var(--fs-grey-500)"><b>500</b><small>#66667b</small></div>
    <div class="sw" style="background:var(--fs-grey-700)"><b>700</b><small>#34343f</small></div>
    <div class="sw" style="background:var(--fs-ink)"><b>ink</b><small>#15093a</small></div>
  </div>
</body></html>
