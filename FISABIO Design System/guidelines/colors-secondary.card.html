<!-- @dsCard group="Colors" viewport="700x180" name="Secondary tints" subtitle="Periwinkle, Sky & Blush — soft fields from the manual's gamma" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .col b{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--fs-ink);display:block;margin-bottom:6px}
  .row{display:flex;gap:6px}
  .sw{flex:1;height:84px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px}
  .sw small{font-family:var(--font-mono);font-size:10px;color:var(--fs-ink)}
</style></head>
<body>
  <div class="grid">
    <div class="col"><b>Periwinkle · 270CP</b><div class="row">
      <div class="sw" style="background:var(--fs-indigo-300)"><small>#a59edb</small></div>
      <div class="sw" style="background:var(--fs-periwinkle)"><small>#bfbee0</small></div>
      <div class="sw" style="background:var(--fs-indigo-100)"><small>#ddddef</small></div>
    </div></div>
    <div class="col"><b>Sky · 552CP</b><div class="row">
      <div class="sw" style="background:var(--fs-sky-300)"><small>#9fcbda</small></div>
      <div class="sw" style="background:var(--fs-sky-200)"><small>#c9e1ea</small></div>
      <div class="sw" style="background:var(--fs-sky-100)"><small>#e7f2f6</small></div>
    </div></div>
    <div class="col"><b>Blush · 691CP</b><div class="row">
      <div class="sw" style="background:var(--fs-blush-300)"><small>#ddb3b6</small></div>
      <div class="sw" style="background:var(--fs-blush-200)"><small>#eaccce</small></div>
      <div class="sw" style="background:var(--fs-blush-100)"><small>#f6e8e9</small></div>
    </div></div>
  </div>
</body></html>
