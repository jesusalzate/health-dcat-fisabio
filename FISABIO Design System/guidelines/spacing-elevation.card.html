<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft, indigo-tinted shadows — never neutral black" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px 24px;background:var(--surface-page);display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .it{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-lg)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="it"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
  <div class="it"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
  <div class="it"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
  <div class="it"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  <div class="it"><div class="box" style="box-shadow:var(--shadow-brand);background:var(--fs-indigo-900)"></div><span class="lbl">brand</span></div>
  <div class="it"><div class="box" style="box-shadow:var(--ring-focus)"></div><span class="lbl">focus ring</span></div>
</body></html>
