<!-- @dsCard group="Colors" viewport="700x176" name="Primary · Indigo" subtitle="Pantone 2766CP #1d0f44 — the core brand colour & its scale" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:108px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-family:var(--font-mono);font-size:11px;opacity:.92;line-height:1.5}
  .sw b{font-family:var(--font-display);font-size:13px;font-weight:600}
  .dark small,.dark b{color:var(--fs-ink)}
  .star{position:absolute;top:8px;left:8px;font-family:var(--font-display);font-size:10px;font-weight:700;color:#fff;letter-spacing:.05em}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--fs-indigo-950)"><b>950</b><small>#120a30</small></div>
    <div class="sw" style="background:var(--fs-indigo-900);position:relative"><span class="star">PRIMARY</span><b>900</b><small>#1d0f44</small></div>
    <div class="sw" style="background:var(--fs-indigo-800)"><b>800</b><small>#271858</small></div>
    <div class="sw" style="background:var(--fs-indigo-700)"><b>700</b><small>#342370</small></div>
    <div class="sw" style="background:var(--fs-indigo-600)"><b>600</b><small>#46318f</small></div>
    <div class="sw" style="background:var(--fs-indigo-500)"><b>500</b><small>#5e47ad</small></div>
    <div class="sw" style="background:var(--fs-indigo-400)"><b>400</b><small>#8073c4</small></div>
    <div class="sw dark" style="background:var(--fs-indigo-300)"><b>300</b><small>#a59edb</small></div>
    <div class="sw dark" style="background:var(--fs-indigo-200)"><b>200</b><small>#bfbee0</small></div>
    <div class="sw dark" style="background:var(--fs-indigo-100)"><b>100</b><small>#ddddef</small></div>
    <div class="sw dark" style="background:var(--fs-indigo-50)"><b>50</b><small>#f1f1f9</small></div>
  </div>
</body></html>
