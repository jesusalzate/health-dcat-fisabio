<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Generous radii — the circle & pill are first-class brand shapes" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px 24px;background:var(--surface-card);display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .box{width:72px;height:72px;background:var(--fs-indigo-100);border:1.5px solid var(--fs-indigo-300)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;margin-top:8px}
  .it{display:flex;flex-direction:column;align-items:center}
  .pill{width:96px;height:46px;border-radius:var(--radius-pill)}
  .circ{border-radius:var(--radius-circle)}
</style></head>
<body>
  <div class="it"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
  <div class="it"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 12</span></div>
  <div class="it"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 16</span></div>
  <div class="it"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 24</span></div>
  <div class="it"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lbl">2xl · 32</span></div>
  <div class="it"><div class="box pill"></div><span class="lbl">pill</span></div>
  <div class="it"><div class="box circ"></div><span class="lbl">circle</span></div>
</body></html>
