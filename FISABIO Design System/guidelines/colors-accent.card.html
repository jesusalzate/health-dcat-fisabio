<!-- @dsCard group="Colors" viewport="700x176" name="Accent · Coral" subtitle="Pantone 1777CP #ff647d — the tertiary accent for emphasis & CTAs" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;gap:8px}
  .sw{flex:1;height:108px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-family:var(--font-mono);font-size:11px;opacity:.92;line-height:1.5}
  .sw b{font-family:var(--font-display);font-size:13px;font-weight:600}
  .dark small,.dark b{color:var(--fs-ink)}
  .star{position:absolute;top:8px;left:8px;font-family:var(--font-display);font-size:10px;font-weight:700;color:#fff;letter-spacing:.05em}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--fs-coral-700)"><b>700</b><small>#cc3a55</small></div>
    <div class="sw" style="background:var(--fs-coral-600)"><b>600</b><small>#ec4e6c</small></div>
    <div class="sw" style="background:var(--fs-coral-500);position:relative"><span class="star">ACCENT</span><b>500</b><small>#ff647d</small></div>
    <div class="sw dark" style="background:var(--fs-coral-400)"><b>400</b><small>#ff8497</small></div>
    <div class="sw dark" style="background:var(--fs-coral-300)"><b>300</b><small>#ffabb8</small></div>
    <div class="sw dark" style="background:var(--fs-coral-200)"><b>200</b><small>#ffd0d8</small></div>
    <div class="sw dark" style="background:var(--fs-coral-100)"><b>100</b><small>#ffe7eb</small></div>
  </div>
</body></html>
