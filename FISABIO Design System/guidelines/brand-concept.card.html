<!-- @dsCard group="Brand" viewport="700x200" name="Concept & circular motif" subtitle="Heart · microscope circle · Asclepius staff · DNA · territory (3 provinces)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--surface-card);display:flex;align-items:center;gap:34px}
  .sym{height:96px}
  .motif{display:flex;gap:14px;align-items:center}
  .c{border-radius:50%}
  .ring{width:70px;height:70px;border:10px solid var(--fs-indigo-900);border-radius:50%}
  .grad{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--fs-coral-300),var(--fs-coral-500) 70%,var(--fs-indigo-700))}
  .dots{display:flex;flex-direction:column;gap:8px}
  .dots span{width:18px;height:18px;border-radius:50%}
  ul{margin:0;padding:0;list-style:none;font-family:var(--font-body);font-size:13px;color:var(--text-body);line-height:1.7}
  ul b{color:var(--fs-ink);font-family:var(--font-display);font-weight:600}
</style></head>
<body>
  <img class="sym" src="../assets/logos/fisabio-symbol-indigo.svg" alt="Fisabio symbol">
  <div class="motif">
    <div class="ring"></div>
    <div class="grad"></div>
    <div class="dots"><span style="background:var(--fs-indigo-900)"></span><span style="background:var(--fs-coral-500)"></span><span style="background:var(--fs-periwinkle)"></span></div>
  </div>
  <ul>
    <li><b>Three chains</b> of semicircles = DNA / RNA</li>
    <li><b>Three</b> chains = three Valencian provinces</li>
    <li>Circular geometry from the <b>microscope</b></li>
    <li>Circles, with &amp; without gradient, build compositions</li>
  </ul>
</body></html>
