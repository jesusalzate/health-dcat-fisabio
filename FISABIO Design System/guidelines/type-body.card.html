<!-- @dsCard group="Type" viewport="700x190" name="Body · Roboto" subtitle="The free-use text face for running copy, captions & UI" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);font-family:var(--font-body);color:var(--text-body)}
  p{margin:0 0 10px;max-width:60ch}
  .lead{font-size:17px;color:var(--fs-ink)}
  .reg{font-size:14px;line-height:1.6}
  .weights{display:flex;gap:22px;margin-top:6px;font-size:14px}
  .sub{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);margin-top:10px}
</style></head>
<body>
  <p class="lead">FISABIO impulsa la investigació sanitària i biomèdica de la Comunitat Valenciana.</p>
  <p class="reg">Roboto és la tipografia de text, d'ús lliure, emprada en papereria, publicacions i entorns digitals — sempre en un cos no inferior a 10 punts.</p>
  <div class="weights">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:700">Bold</span>
  </div>
  <p class="sub">--font-body</p>
</body></html>
