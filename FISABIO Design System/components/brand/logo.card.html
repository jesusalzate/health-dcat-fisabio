<!-- @dsCard group="Components" viewport="700x240" name="Logo" subtitle="Lockup, imagotip & symbol via the Logo component" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .tile{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 22px;display:flex;align-items:center;gap:20px}
  .dark{background:var(--surface-brand);border-color:transparent}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:70px}
  .dark .lbl{color:var(--text-on-brand-muted)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Logo } = window.FISABIODesignSystem_61892e;
  const BP = "../../assets/logos";
  function Demo(){
    return (
      <div className="stack">
        <div className="tile"><span className="lbl">lockup</span><Logo variant="lockup" tone="indigo" height={42} basePath={BP}/></div>
        <div className="tile"><span className="lbl">imagotip</span><Logo variant="logo" tone="indigo" height={34} basePath={BP}/><Logo variant="symbol" tone="coral" height={44} basePath={BP}/></div>
        <div className="tile dark"><span className="lbl">negative</span><Logo variant="logo" tone="white" height={34} basePath={BP}/><Logo variant="symbol" tone="periwinkle" height={44} basePath={BP}/></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
