<!-- @dsCard group="Components" viewport="700x430" name="Buttons · Badges · Inputs · Tabs" subtitle="Core interaction primitives" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-body)}
  .grid{display:flex;flex-direction:column;gap:22px}
  .group{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .row2{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
  .blk{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Input, Tabs } = window.FISABIODesignSystem_61892e;
  const arrow = React.createElement("span", null, "\u2192");
  function Demo(){
    const [tab,setTab] = React.useState("recerca");
    return (
      <div className="grid">
        <div>
          <div className="lbl">Buttons</div>
          <div className="group">
            <Button variant="primary">Sol·licitar accés</Button>
            <Button variant="accent" icon={arrow} iconRight>Descobreix</Button>
            <Button variant="secondary">Cancel·la</Button>
            <Button variant="ghost">Més info</Button>
            <Button variant="danger">Elimina</Button>
            <Button variant="primary" disabled>Desactivat</Button>
          </div>
          <div className="group" style={{marginTop:12}}>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
          </div>
        </div>
        <div className="row2">
          <div className="blk" style={{flex:1,minWidth:240}}>
            <div className="lbl">Badges</div>
            <div className="group">
              <Badge variant="soft">Epidemiologia</Badge>
              <Badge variant="sky">Genòmica</Badge>
              <Badge variant="coral">Nou</Badge>
              <Badge variant="solid">Destacat</Badge>
              <Badge variant="success" dot>Actiu</Badge>
              <Badge variant="warning" dot>En revisió</Badge>
              <Badge variant="outline">Arxivat</Badge>
            </div>
          </div>
          <div className="blk" style={{width:260}}>
            <div className="lbl">Input</div>
            <Input label="Correu electrònic" type="email" placeholder="nom@gva.es" required />
          </div>
        </div>
        <div className="blk">
          <div className="lbl">Tabs</div>
          <Tabs tabs={[{id:"recerca",label:"Recerca"},{id:"equip",label:"Equip"},{id:"publicacions",label:"Publicacions"}]} value={tab} onChange={setTab} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
