<!-- @dsCard group="Website" viewport="1280x900" name="Institutional website" subtitle="FISABIO corporate site — home, research areas & article (click-through)" -->
<!doctype html><html lang="ca"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FISABIO — Website UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page)}
  .kit-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:90;display:flex;gap:4px;
    background:var(--fs-indigo-950);padding:6px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg)}
  .kit-nav button{font-family:var(--font-display);font-weight:600;font-size:13px;color:rgba(255,255,255,.7);
    background:none;border:none;cursor:pointer;padding:8px 16px;border-radius:var(--radius-pill)}
  .kit-nav button.on{background:var(--accent);color:#fff}
</style>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Blocks.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" data-presets="react">
  const WK = window.FSWeb;
  function App(){
    const [route,setRoute] = React.useState("home");
    const go = (r)=>{ setRoute(r); window.scrollTo({top:0}); };
    React.useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
    return (
      <div>
        <WK.SiteHeader route={route} go={go} />
        {route==="home" && <WK.HomeScreen go={go} />}
        {route==="areas" && <WK.AreasScreen go={go} />}
        {route==="article" && <WK.ArticleScreen go={go} />}
        <WK.SiteFooter />
        <div className="kit-nav">
          {[["home","Inici"],["areas","Investigació"],["article","Notícia"]].map(([id,l])=>(
            <button key={id} className={route===id?"on":""} onClick={()=>go(id)}>{l}</button>
          ))}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
